<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart & Checkout</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-container { max-width: 800px; margin: 2rem auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .checkout-form { margin-top: 30px; padding: 20px; background: #f9f9f9; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .checkout-form h3 { margin-bottom: 15px; color: #2c3e50; }
        .checkout-form input, .checkout-form select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-checkout { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-checkout:hover { background: #219150; }
    </style>
</head>
<body>
    <header style="padding: 20px; background: #2c3e50; color: white; display: flex; justify-content: space-between;">
        <h2><a href="index.html" style="text-decoration:none; color:white;">CodeAlpha Store</a></h2>
        <nav>
            <a href="orders.html" style="color:white; margin-right: 15px; text-decoration:none;">📦 My Orders</a>
            <a href="index.html" style="color:white; text-decoration:none;">🏪 Store</a>
        </nav>
    </header>

    <main class="cart-container">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items"></div>
        <h3 id="cart-total" style="text-align: right; margin-top: 20px;">Total: $0.00</h3>

        <div class="checkout-form" id="checkout-section" style="display:none;">
            <h3>Shipping & Secure Payment</h3>
            <input type="text" id="address" placeholder="Enter Full Delivery Address" required>
            <select id="payment-mode">
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="Credit/Debit Card">Credit/Debit Card</option>
                <option value="UPI / NetBanking">UPI / NetBanking</option>
            </select>
            <button onclick="placeOrder()" class="btn-checkout">Complete Order & Purchase</button>
        </div>
    </main>

    <script src="js/cart.js"></script>
</body>
</html>
