<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - CodeAlpha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h2>CodeAlpha Store</h2>
        <nav>
            <a href="index.html" style="color: white; font-weight: bold;">Back to Store</a>
        </nav>
    </header>
    <main style="max-width: 800px; margin: 2rem auto; padding: 0 1rem;">
        <h2>Your Shopping Cart</h2>
        <div id="cartItems" style="margin: 2rem 0;"></div>
        <h3 id="cartTotal" style="text-align: right;">Total: $0.00</h3>

        <div id="checkoutSection" style="display: none; background: #fff; padding: 2rem; margin-top: 2rem; border-radius: 8px;">
            <h3>Checkout Details</h3>
            <form id="checkoutForm" onsubmit="placeOrder(event)" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                <input type="text" id="address" placeholder="Full Shipping Address" required style="padding: 10px;">
                <select id="paymentMode" style="padding: 10px;">
                    <option value="Cash on Delivery">Cash on Delivery (COD)</option>
                    <option value="Credit/Debit Card">Credit/Debit Card</option>
                    <option value="UPI">UPI</option>
                </select>
                <button type="submit" style="background: #27ae60; padding: 15px; font-size: 1.1rem;">Place Order</button>
            </form>
        </div>
    </main>
    <script src="js/cart.js"></script>
</body>
</html>
