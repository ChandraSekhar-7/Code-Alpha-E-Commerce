<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details - CodeAlpha Store</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-details-container { max-width: 1000px; margin: 4rem auto; display: flex; gap: 40px; padding: 20px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .details-image { width: 50%; border-radius: 12px; object-fit: cover; }
        .details-info { width: 50%; display: flex; flex-direction: column; justify-content: center; }
        .details-info h1 { font-size: 2.5rem; color: #2c3e50; margin-bottom: 10px; }
        .details-info .price { font-size: 2rem; color: #27ae60; font-weight: bold; margin-bottom: 20px; }
        .details-info p { color: #7f8c8d; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-large { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-large:hover { background: #2980b9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <h2><a href="index.html" style="text-decoration:none; color:inherit;">CodeAlpha Store</a></h2>
        <nav>
            <a href="orders.html">📦 My Orders</a>
            <a href="cart.html">🛒 Cart</a>
        </nav>
    </header>

    <main id="single-product-view" style="padding: 0 5%;">
        <h2 style="text-align:center; margin-top: 50px;">Loading product details...</h2>
    </main>

    <script>
        // 1. Get the product ID from the URL (e.g., ?id=12345)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // Make sure to change this to your live Render backend URL!
        const API_URL = 'http://localhost:3000/api'; 

        async function loadProduct() {
            try {
                const response = await fetch(`${API_URL}/products/${productId}`);
                const product = await response.json();

                if (response.ok) {
                    document.getElementById('single-product-view').innerHTML = `
                        <div class="product-details-container">
                            <img src="${product.image}" alt="${product.name}" class="details-image">
                            <div class="details-info">
                                <span class="category-tag">${product.category}</span>
                                <h1>${product.name}</h1>
                                <p class="price">$${product.price.toFixed(2)}</p>
                                <p>${product.description}</p>
                                <button class="btn-large" onclick="addToCart('${product._id}', '${product.name}', ${product.price})">Add to Cart</button>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('single-product-view').innerHTML = `<h2 style="text-align:center; color:red;">Product not found.</h2>`;
                }
            } catch (error) {
                document.getElementById('single-product-view').innerHTML = `<h2 style="text-align:center; color:red;">Error connecting to server.</h2>`;
            }
        }

        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('ecommerce_cart')) || [];
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) existingItem.quantity += 1;
            else cart.push({ id, name, price, quantity: 1 });

            localStorage.setItem('ecommerce_cart', JSON.stringify(cart));
            alert(`${name} added to cart!`);
        }

        loadProduct();
    </script>
</body>
</html>
