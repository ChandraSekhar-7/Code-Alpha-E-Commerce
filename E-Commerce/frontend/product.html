<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details - CodeAlpha Store</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-details-container { max-width: 1000px; margin: 3rem auto; display: flex; gap: 40px; padding: 25px; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .details-image { width: 45%; border-radius: 12px; object-fit: cover; max-height: 480px; background: #fdffdf; }
        .details-info { width: 55%; display: flex; flex-direction: column; }
        .details-info h1 { font-size: 2.4rem; color: #2c3e50; margin: 10px 0; }
        .details-info .price { font-size: 2.2rem; color: #27ae60; font-weight: bold; margin-bottom: 15px; }
        .details-info .description-box { color: #555; font-size: 1.05rem; line-height: 1.6; margin-bottom: 25px; }
        
        /* Premium Specifications Table Styling */
        .specs-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; margin-top: 10px; }
        .specs-table tr { border-bottom: 1px solid #eee; }
        .specs-table td { padding: 10px 12px; font-size: 0.95rem; }
        .specs-table td.label { font-weight: bold; color: #7f8c8d; width: 35%; }
        .specs-table td.value { color: #2c3e50; }

        .badge-status { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; width: fit-content; margin-bottom: 15px; }
        .badge-status.instock { background: #e8f8f5; color: #1abc9c; }

        .btn-large { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; box-sizing: border-box; }
        .btn-large:hover { background: #2980b9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <header style="padding: 20px; background: #2c3e50; color: white; display: flex; justify-content: space-between;">
        <h2><a href="index.html" style="text-decoration:none; color:white;">CodeAlpha Store</a></h2>
        <nav>
            <a href="orders.html" style="color:white; margin-right: 15px; text-decoration:none;">📦 My Orders</a>
            <a href="cart.html" style="color:white; text-decoration:none;">🛒 Cart</a>
        </nav>
    </header>

    <main id="single-product-view" class="orders-container">
        <h2 style="text-align:center; margin-top: 50px;">Parsing advanced product metrics...</h2>
    </main>

    <script src="js/product.js"></script>
</body>
</html>
