<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store - CodeAlpha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h2>CodeAlpha Store</h2>
        <nav>
            <a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
            <button onclick="logout()">Logout</button>
        </nav>
    </header>
    <main>
        <div class="category-filters">
            <button class="filter-btn active" onclick="filterProducts('All', this)">All</button>
            <button class="filter-btn" onclick="filterProducts('Electronics', this)">Electronics</button>
            <button class="filter-btn" onclick="filterProducts('Clothing', this)">Clothing</button>
            <button class="filter-btn" onclick="filterProducts('Sports', this)">Sports</button>
            <button class="filter-btn" onclick="filterProducts('Accessories', this)">Accessories</button>
            
        </div>

        <section id="product-list" class="product-grid"></section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
