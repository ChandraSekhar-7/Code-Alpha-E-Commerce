<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - CodeAlpha Store</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .orders-container { max-width: 900px; margin: 3rem auto; padding: 0 20px; }
        .order-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 15px; }
        .order-status { font-weight: bold; color: #f39c12; background: #fdf3e7; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; }
        .order-items { list-style: none; padding: 0; margin: 0; }
        .order-items li { display: flex; justify-content: space-between; margin-bottom: 8px; color: #555; }
        .order-total { text-align: right; font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .order-total.unpaid { color: #e67e22; } /* Orange formatting for COD */
        .order-total.paid { color: #27ae60; }   /* Green formatting for online payments */
    </style>
</head>
<body>
    <header style="padding: 20px; background: #2c3e50; color: white; display: flex; justify-content: space-between;">
        <h2><a href="index.html" style="text-decoration:none; color:white;">CodeAlpha Store</a></h2>
        <nav>
            <a href="index.html" style="color:white; margin-right:15px; text-decoration:none;">🏪 Store</a>
            <a href="cart.html" style="color:white; text-decoration:none;">🛒 Cart</a>
        </nav>
    </header>

    <main class="orders-container">
        <h2 style="margin-bottom: 20px; color: #2c3e50;">Your Purchase History</h2>
        <div id="orders-list">
            <p style="text-align: center;">Retrieving your customized order timeline...</p>
        </div>
    </main>

    <script>
        const API_URL = 'https://code-alpha-e-commerce-1.onrender.com/api';

        async function loadOrders() {
            try {
                // 1. Secure check: extract the logged-in user's storage session key
                const userId = localStorage.getItem('ecommerce_userId');
                
                if (!userId) {
                    document.getElementById('orders-list').innerHTML = 
                        '<p style="text-align: center; color: #e74c3c; font-weight: bold;">Please log in to view your personalized purchase history.</p>';
                    return;
                }

                // 2. Fetch passing the unique userId in the path parameter
                const response = await fetch(`${API_URL}/orders/${userId}`);
                const orders = await response.json();
                
                const ordersList = document.getElementById('orders-list');
                if(!ordersList) return;
                ordersList.innerHTML = '';

                if (!orders || orders.length === 0) {
                    ordersList.innerHTML = '<p style="text-align: center; color: #7f8c8d;">You have no recorded past purchases.</p>';
                    return;
                }

                orders.forEach(order => {
                    let itemsHtml = order.items.map(item => `
                        <li>
                            <span>${item.quantity}x ${item.name}</span> 
                            <span>$${(item.price * item.quantity).toFixed(2)}</span>
                        </li>
                    `).join('');
                    
                    // --- DYNAMIC PAYMENT METHOD RENDERING ---
                    let paymentLabel = "";
                    let totalClass = "";

                    if (order.paymentMode === "Cash on Delivery") {
                        paymentLabel = "Amount to be Paid";
                        totalClass = "unpaid";
                    } else {
                        paymentLabel = "Amount Paid";
                        totalClass = "paid";
                    }
                    
                    ordersList.innerHTML += `
                        <div class="order-card">
                            <div class="order-header">
                                <span><strong>Order Reference ID:</strong> ${order._id}</span>
                                <span class="order-status">${order.status || 'Pending'}</span>
                            </div>
                            <ul class="order-items">
                                ${itemsHtml}
                            </ul>
                            <div class="order-total ${totalClass}">
                                ${paymentLabel}: $${order.totalAmount.toFixed(2)}
                            </div>
                            <p style="font-size: 0.85rem; color: #888; margin-top: 10px; background: #fdfdfd; padding: 8px; border-radius:4px;">
                                📍 <strong>Shipping Address:</strong> ${order.address} <br>
                                💳 <strong>Payment Method:</strong> ${order.paymentMode}
                            </p>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('orders-list').innerHTML = 
                    '<p style="text-align: center; color: red;">Failed to retrieve order history documentation from backend.</p>';
            }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
