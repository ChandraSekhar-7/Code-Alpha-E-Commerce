<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - CodeAlpha Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h2>CodeAlpha Store</h2>
            <p class="subtitle">Sign in or create an account to start shopping.</p>
            
            <form id="authForm" class="auth-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <button type="button" onclick="login()" class="btn-primary">Login to Store</button>
                <div class="divider"><span>OR</span></div>
                <button type="button" onclick="register()" class="btn-secondary">Create New Account</button>
            </form>
            <p id="authMessage" class="error-text"></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
